name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Changed from main to master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          # This ensures the website looks for files in the correct subfolder
          flutter build web --release --base-href "/SyedPiyalPortfolio-/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: deploy  # This tells the action to push to your deploy branch